function reqSatisfied(def, upgs) {
  if (!def.req) return true;
  return Object.entries(def.req).every(([r,v]) => (upgs[r]||0) >= v);
}
function reqLabel(def) {
  if (!def.req) return "";

    const rd = UPGRADE_DEFS.find(u=>u.id===r);
    return (rd ? rd.name : r) + " " + v;
  }).join(" + ");
}

// ══════════════════════════════════════════════════
//  AUDIO — Web Audio API (synthesised, no files)
// ══════════════════════════════════════════════════
let _ac = null, _acComp = null;
function getAc() {
  if (!_ac) {
    try {
      _ac = new (window.AudioContext||window.webkitAudioContext)();
      // Master limiter — prevents clipping no matter how many sounds stack
      _acComp = _ac.createDynamicsCompressor();
      _acComp.threshold.value = -14;  // compress above -14 dB
      _acComp.knee.value      =   4;
      _acComp.ratio.value     =  18;  // strong limiting ratio
      _acComp.attack.value    = 0.001;
      _acComp.release.value   = 0.08;
      _acComp.connect(_ac.destination);
    } catch(e){}
  }
  if (_ac && _ac.state === "suspended") _ac.resume();
  return _ac;
}
function _dest() { return _acComp || (_ac ? _ac.destination : null); }
function tone(f, tp, vol, dur, fe) {
  const c = getAc(); if (!c) return;
  const o = c.createOscillator(), g = c.createGain();
  o.connect(g); g.connect(_dest());
  o.type = tp || "sine"; o.frequency.setValueAtTime(f, c.currentTime);
  if (fe) o.frequency.exponentialRampToValueAtTime(Math.max(1, fe), c.currentTime + dur);
  const tv = Math.min(0.16, (vol || 0.14) * 0.68);
  g.gain.setValueAtTime(0.001, c.currentTime);
  g.gain.linearRampToValueAtTime(tv, c.currentTime + 0.009);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
  o.start(); o.stop(c.currentTime + dur + 0.01);
}
function noise(vol, dur, lpf) {
  const c = getAc(); if (!c) return;
  const sr = c.sampleRate, bl = Math.ceil(sr * dur);
  const buf = c.createBuffer(1, bl, sr), dt = buf.getChannelData(0);
  for (let i = 0; i < bl; i++) dt[i] = (Math.random() * 2 - 1) * Math.max(0, 1 - i / bl);
  const src = c.createBufferSource(), g = c.createGain(), f = c.createBiquadFilter();
  f.type = "lowpass"; f.frequency.value = lpf || 380;
  src.buffer = buf; src.connect(f); f.connect(g); g.connect(_dest());
  const nv = (vol || 0.16) * 0.52;
  g.gain.setValueAtTime(0.001, c.currentTime);
  g.gain.linearRampToValueAtTime(nv, c.currentTime + 0.006);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
  src.start(); src.stop(c.currentTime + dur + 0.01);
}
let _lastShootT = 0;
function sndShoot(cls, w) {
  if (w === "bomb") { noise(0.04, 0.07, 260); return; }
  // Debounce: skip if last shoot sound < 70 ms ago — prevents oscillator stacking / saturation
  const now = performance.now();
  if (now - _lastShootT < 70) return;
  _lastShootT = now;
  // "piou" — frequency sweep per class
  if (cls === "pyro")   { tone(720,  "square",   0.032, 0.10, 95);  } // warm descending laser
  else if (cls === "cryo")   { tone(1150, "sine",     0.028, 0.09, 380); } // icy high piou
  else if (cls === "foudre") { tone(520,  "square",   0.028, 0.06, 950); } // electric zap
  else                       { tone(380,  "sine",     0.032, 0.11, 55);  } // void deep pulse
}
function sndImpact() { tone(90, "sine", 0.065, 0.06, 45); }
function sndExplosion(big) { noise(big ? 0.15 : 0.085, big ? 0.38 : 0.13, big ? 270 : 420); if (big) tone(55, "sine", 0.11, 0.32, 18); }
function sndPickup() { tone(660, "sine", 0.065, 0.1, 990); }
function sndSf() { tone(880, "sine", 0.045, 0.09, 1320); }
function sndHurt() { noise(0.08, 0.11, 190); tone(75, "triangle", 0.08, 0.11, 38); }
function sndUlt(cls) {
  if (cls === "pyro")   { noise(0.09, 0.22, 480); tone(75, "triangle", 0.11, 0.22, 28); }
  else if (cls === "cryo")   { [440,554,659,880].forEach((f,i) => setTimeout(() => tone(f,"sine",0.09,0.22), i * 40)); }
  else if (cls === "foudre") { tone(320, "triangle", 0.11, 0.15, 1100); }
  else                       { tone(110, "sine", 0.14, 0.32, 28); noise(0.065, 0.32, 160); }
}
function sndCombo(n) { if (n >= 3) tone(330 + Math.min(n, 12) * 28, "triangle", 0.028, 0.06, 600 + n * 50); }
function sndArenaComplete() { [330,415,494,659].forEach((f,i) => setTimeout(() => tone(f,"sine",0.09,0.2), i * 70)); }
function sndBossDeath() { noise(0.16, 0.44, 230); [220,277,330,440,554,659].forEach((f,i) => setTimeout(() => tone(f,"sine",0.1,0.32), i * 75)); }

// ── Background music — Kung Fury synthwave ────────────────────────────────────
let _bgStop=true,_bgPause=false,_bgSeq=0;
const _BG_MS=117; // 16th-note at 128 BPM (60000/128/4 ≈ 117ms)
// 64-step Am progression (8 s loop): Am×2 → F/C → G→Am
// Lead melody — square, mid-range (A3-E4 area mostly, accents to A4)
const _BG_M=[
  440,0,330,440, 523,0,330,0, 440,330,0,440, 523,330,440,330, // Am riff 1
  440,0,330,440, 523,330,0,523, 659,0,523,0, 440,523,330,0,   // Am riff 2 (accent)
  349,0,261,349, 440,0,261,0, 349,261,0,349, 440,261,349,261, // F/C color
  392,0,294,392, 494,0,392,0, 659,0,494,0, 523,440,330,0      // G tension → Am
];
// Bass — sine, driving
const _BG_B=[
  110,0,0,0, 82,0,0,0, 110,0,0,0, 82,0,110,0,
  110,0,0,82, 110,0,82,0, 110,0,82,110, 82,0,0,0,
  87,0,0,0, 87,0,0,0, 130,0,0,0, 130,0,87,0,
  98,0,0,0, 98,0,73,0, 98,0,0,73, 110,0,82,0
];
function _bgTick(){
  if(_bgStop)return;
  if(!_bgPause){
    const c=getAc();
    if(c){
      const i=_bgSeq%_BG_M.length;
      // Lead melody: square wave for 8-bit crunch, soft volume
      if(_BG_M[i]){
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(_dest());
        o.type="square";o.frequency.setValueAtTime(_BG_M[i],c.currentTime);
        g.gain.setValueAtTime(0.001,c.currentTime);
        g.gain.linearRampToValueAtTime(0.020,c.currentTime+0.008);
        g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.078);
        o.start();o.stop(c.currentTime+0.088);
      }
      // Bass: deep sine
      if(_BG_B[i]){
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(_dest());
        o.type="sine";o.frequency.setValueAtTime(_BG_B[i],c.currentTime);
        g.gain.setValueAtTime(0.001,c.currentTime);
        g.gain.linearRampToValueAtTime(0.042,c.currentTime+0.016);
        g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.16);
        o.start();o.stop(c.currentTime+0.18);
      }
      // Kick: 4-on-the-floor (every beat = every 4 steps)
      if(i%4===0){
        const vol=i%8===0?0.062:0.038; // accent on beats 1&3
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(_dest());
        o.type="sine";o.frequency.setValueAtTime(80,c.currentTime);
        o.frequency.exponentialRampToValueAtTime(28,c.currentTime+0.07);
        g.gain.setValueAtTime(0.001,c.currentTime);
        g.gain.linearRampToValueAtTime(vol,c.currentTime+0.004);
        g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.13);
        o.start();o.stop(c.currentTime+0.14);
      }
      // Snare: beats 2 and 4 (steps 4, 12 per bar → i%8===4)
      if(i%8===4){
        // Snare body
        const os=c.createOscillator(),gs=c.createGain();
        os.connect(gs);gs.connect(_dest());
        os.type="sine";os.frequency.setValueAtTime(190,c.currentTime);
        os.frequency.exponentialRampToValueAtTime(65,c.currentTime+0.055);
        gs.gain.setValueAtTime(0.001,c.currentTime);
        gs.gain.linearRampToValueAtTime(0.034,c.currentTime+0.003);
        gs.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.065);
        os.start();os.stop(c.currentTime+0.07);
        // Snare snap (bandpass noise)
        const sr2=c.sampleRate,bl2=Math.ceil(sr2*0.05);
        const b2=c.createBuffer(1,bl2,sr2),d2=b2.getChannelData(0);
        for(let j=0;j<bl2;j++)d2[j]=Math.random()*2-1;
        const ns=c.createBufferSource(),ng=c.createGain(),nf=c.createBiquadFilter();
        nf.type="bandpass";nf.frequency.value=2800;nf.Q.value=0.5;
        ns.buffer=b2;ns.connect(nf);nf.connect(ng);ng.connect(_dest());
        ng.gain.setValueAtTime(0.001,c.currentTime);
        ng.gain.linearRampToValueAtTime(0.022,c.currentTime+0.003);
        ng.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.05);
        ns.start();ns.stop(c.currentTime+0.06);
      }
      // Closed hi-hat: 8th notes (every 2 steps), very subtle
      if(i%2===0&&i%4!==0){
        const sr3=c.sampleRate,bl3=Math.ceil(sr3*0.022);
        const b3=c.createBuffer(1,bl3,sr3),d3=b3.getChannelData(0);
        for(let j=0;j<bl3;j++)d3[j]=Math.random()*2-1;
        const nh=c.createBufferSource(),hg=c.createGain(),hf=c.createBiquadFilter();
        hf.type="highpass";hf.frequency.value=7000;
        nh.buffer=b3;nh.connect(hf);hf.connect(hg);hg.connect(_dest());
        hg.gain.setValueAtTime(0.001,c.currentTime);
        hg.gain.linearRampToValueAtTime(0.010,c.currentTime+0.002);
        hg.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.020);
        nh.start();nh.stop(c.currentTime+0.025);
      }
      _bgSeq++;
    }
  }
  setTimeout(_bgTick,_BG_MS);
}
function startBGMusic(){if(!_bgStop)return;_bgStop=false;_bgPause=false;_bgSeq=0;setTimeout(_bgTick,400);}
function stopBGMusic(){_bgStop=true;}
function pauseBGMusic(){_bgPause=true;}
function resumeBGMusic(){_bgPause=false;}

function rng(a, b) { return Math.random() * (b - a) + a; }
function dst(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }
function pickAnomalies() {
  const pool = [...ANOMALIES]; const out = [];
  for (let i = 0; i < 2 && pool.length; i++) { const j = ~~(Math.random() * pool.length); out.push(pool.splice(j, 1)[0]); }
  return out;
}

  if (s3) { plats.push({ x:160, y:GROUND_Y-90, w:80, h:10, zone:0 }); }
  arenas.push({ x:800, w:350,
    waves: s4 ? [[{t:"h",n:1},{t:"mc",n:2}],[{t:"er",n:1},{t:"mc",n:2}],[{t:"h",n:1},{t:"er",n:1},{t:"mc",n:1}]]

         : s2 ? [[{t:"w",n:2},{t:"f",n:1}],[{t:"w",n:1},{t:"f",n:1},{t:"mc",n:1}],[{t:"f",n:1},{t:"mc",n:1}]]
              : [[{t:"w",n:2}],[{t:"w",n:1},{t:"f",n:1}]],
    curWave:0, active:false, cleared:false, spawnT:0 });
  plats.push({ x:880,  y:GROUND_Y-90,  w:100, h:10, zone:0 });
  plats.push({ x:1020, y:GROUND_Y-130, w:80,  h:10, zone:0 });
  if (s3) { hazards.push({ x:1130, y:GROUND_Y-3, w:80, tp:"spikes", zone:0 }); }

  // === ZONE 1 (ZONE_W - ZONE_W*2) ===
  movPlats.push({ x:ZONE_W+80,  y:GROUND_Y-90,  w:80, h:10, zone:1, ax:ZONE_W+80,  bx:ZONE_W+220, spd:0.7, t:0, vx:0 });
  movPlats.push({ x:ZONE_W+320, y:GROUND_Y-140, w:70, h:10, zone:1, ay:GROUND_Y-170, by:GROUND_Y-80, spd:0.5, t:Math.PI, vx:0 });
  if (s3) { movPlats.push({ x:ZONE_W+160, y:GROUND_Y-100, w:70, h:10, zone:1, ax:ZONE_W+120, bx:ZONE_W+300, spd:0.9, t:1, vx:0 }); }
  plats.push({ x:ZONE_W+460, y:GROUND_Y-100, w:90, h:10, zone:1 });
  hazards.push({ x:ZONE_W+600, y:GROUND_Y-3, w:120, tp:"spikes", zone:1 });
  if (s2) hazards.push({ x:ZONE_W+760, y:GROUND_Y-150, tp:"laser", h:150, zone:1 });
  if (s3) hazards.push({ x:ZONE_W+680, y:GROUND_Y-150, tp:"laser", h:150, zone:1 });
  if (s4) hazards.push({ x:ZONE_W+840, y:GROUND_Y-3, w:100, tp:"lava", zone:1 });
  plats.push({ x:ZONE_W+620, y:GROUND_Y-70,  w:80, h:10, zone:1 });
  arenas.push({ x:ZONE_W+800, w:400,
    waves: s4 ? [[{t:"h",n:1},{t:"er",n:1},{t:"mc",n:1}],[{t:"er",n:2},{t:"mc",n:1}],[{t:"h",n:1},{t:"er",n:1},{t:"mc",n:2}]]
         : s3 ? [[{t:"w",n:1},{t:"f",n:1},{t:"mc",n:1}],[{t:"f",n:1},{t:"mc",n:2}],[{t:"h",n:1},{t:"mc",n:1},{t:"er",n:1}]]
         : s2 ? [[{t:"w",n:2},{t:"f",n:1}],[{t:"f",n:1},{t:"mc",n:2}],[{t:"w",n:1},{t:"h",n:1},{t:"mc",n:1}]]
              : [[{t:"w",n:2},{t:"f",n:1}],[{t:"f",n:1},{t:"mc",n:2}],[{t:"w",n:1},{t:"h",n:1},{t:"mc",n:1}]],
    curWave:0, active:false, cleared:false, spawnT:0 });
  plats.push({ x:ZONE_W+880,  y:GROUND_Y-100, w:100, h:10, zone:1 });
  plats.push({ x:ZONE_W+1050, y:GROUND_Y-140, w:80,  h:10, zone:1 });

  // === ZONE 2 (ZONE_W*2 - LEVEL_W) ===
  plats.push({ x:ZONE_W*2+80,  y:GROUND_Y-65,  w:80, h:10, zone:2 });
  plats.push({ x:ZONE_W*2+180, y:GROUND_Y-130, w:70, h:10, zone:2 });
  plats.push({ x:ZONE_W*2+80,  y:GROUND_Y-190, w:70, h:10, zone:2 });
  movPlats.push({ x:ZONE_W*2+300, y:GROUND_Y-90, w:80, h:10, zone:2, ax:ZONE_W*2+300, bx:ZONE_W*2+440, spd:0.9, t:0, vx:0 });
  if (s3) { movPlats.push({ x:ZONE_W*2+420, y:GROUND_Y-130, w:70, h:10, zone:2, ay:GROUND_Y-160, by:GROUND_Y-80, spd:1.1, t:2, vx:0 }); }
  hazards.push({ x:ZONE_W*2+500, y:GROUND_Y-3, w:100, tp:"spikes", zone:2 });
  hazards.push({ x:ZONE_W*2+650, y:GROUND_Y-3, w:80,  tp:"spikes", zone:2 });
  if (s2) hazards.push({ x:ZONE_W*2+760, y:GROUND_Y-3, w:130, tp:"lava", zone:2 });
  if (s3) hazards.push({ x:ZONE_W*2+720, y:GROUND_Y-150, tp:"laser", h:150, zone:2 });
  if (s4) { hazards.push({ x:ZONE_W*2+580, y:GROUND_Y-3, w:60, tp:"lava", zone:2 }); hazards.push({ x:ZONE_W*2+680, y:GROUND_Y-150, tp:"laser", h:150, zone:2 }); }
  plats.push({ x:ZONE_W*2+510, y:GROUND_Y-70,  w:80, h:10, zone:2 });
  plats.push({ x:ZONE_W*2+640, y:GROUND_Y-110, w:70, h:10, zone:2 });

  const bossType = stage === 1 ? "garde" : stage === 2 ? "seign" : stage === 3 ? "vortex" : "final";
  arenas.push({ x:ZONE_W*2+800, w:500,
    waves: s4 ? [[{t:"er",n:1},{t:"h",n:1},{t:"mc",n:1}],[{t:"er",n:1},{t:"mc",n:1},{t:"h",n:1}],[{t:"er",n:2},{t:"mc",n:1}]]
         : s3 ? [[{t:"f",n:1},{t:"h",n:1},{t:"mc",n:1}],[{t:"h",n:1},{t:"mc",n:1},{t:"er",n:1}],[{t:"f",n:1},{t:"er",n:2}]]
              : [[{t:"f",n:1},{t:"h",n:1},{t:"mc",n:1}],[{t:"h",n:1},{t:"f",n:1},{t:"er",n:1}]],
    curWave:0, active:false, cleared:false, spawnT:0, boss:true, bossType });
  plats.push({ x:ZONE_W*2+880,  y:GROUND_Y-100, w:100, h:10, zone:2 });
  plats.push({ x:ZONE_W*2+1060, y:GROUND_Y-140, w:80,  h:10, zone:2 });

  // Decors
  const decors = [];
  for (let i=0;i<10;i++) decors.push({ x:rng(0,ZONE_W),         y:rng(40,GROUND_Y-60),  tp:0, sz:rng(30,70) });
  for (let i=0;i<12;i++) decors.push({ x:ZONE_W+rng(0,ZONE_W),  y:rng(30,GROUND_Y-30),  tp:1, sz:rng(15,50) });
  for (let i=0;i<12;i++) decors.push({ x:ZONE_W*2+rng(0,ZONE_W),y:rng(50,GROUND_Y-20),  tp:2, sz:rng(20,55) });

  // Spawns (outside arenas)
  const spawns = [];
  const arenaRanges = arenas.map(a => [a.x, a.x + a.w]);
  const spawnCount = s4 ? 18 : s3 ? 16 : s2 ? 15 : 12;
  for (let i = 0; i < spawnCount; i++) {
    const wx = 400 + i * (LEVEL_W - 600) / spawnCount;
    const inArena = arenaRanges.some(([a, b]) => wx > a - 50 && wx < b + 50);
    if (inArena) continue;
    const zone = wx < ZONE_W ? 0 : wx < ZONE_W * 2 ? 1 : 2;
    const types = zone === 0
      ? (s3 ? ["w","f","mc"] : s2 ? ["w","w","f","f"] : ["w","w","f"])
      : zone === 1
      ? (s3 ? ["f","h","mc","mc","er"] : s2 ? ["w","f","h","mc","mc"] : ["w","f","h","mc"])
      : (s3 ? ["h","mc","er","er"] : s2 ? ["f","h","mc","er","er"] : ["f","h","h","mc","er"]);
    spawns.push({ x:wx, tp:types[~~(Math.random()*types.length)], triggered:false });
  }

  // Crates
  const crateTypes = ["heavy","shotgun","laser","bomb","food","medal","sf","sf"];
  const crates = [];
  for (let i = 0; i < 14; i++) {
    const cx = 250 + i * (LEVEL_W - 400) / 14;
    crates.push({ x:cx, y:GROUND_Y-20, tp:crateTypes[~~(Math.random()*crateTypes.length)], alive:true });
  }

  return { plats, decors, spawns, crates, movPlats, hazards, arenas };
}

// ══════════════════════════════════════════════════

function CosmicSlug() {
  const canvasRef = useRef(null);
  const gs = useRef(null);
  const keys = useRef({});
  const raf = useRef(null);
  const [screen, setScreen] = useState("title");
  const [selCls, setSelCls] = useState(null);
  const [diff, setDiff] = useState(null);
  const [fScore, setFScore] = useState(0);
  const [hiScore, setHiScore] = useState(() => loadPersist().hiScore || 0);
  const [starFrags, setStarFrags] = useState(() => loadPersist().starFrags || 0);
  const [upgrades, setUpgrades] = useState(() => loadPersist().upgrades || {});
  const [activeAnomalies, setActiveAnomalies] = useState([]);
  const [pendingAnomalies, setPendingAnomalies] = useState([]);
  const [paused, setPaused] = useState(false);
  const [touchDevice, setTouchDevice] = useState(false);
  const pausedRef = useRef(false);

  const init = useCallback((cls, d, upgObj, anomalies) => {
    const dc = DIFF[d] || DIFF.normal;
    const ug = upgObj || {};
    const anIds = (anomalies || []).map(a => a.id);
    const jumpMul = anIds.includes("jumpBoost") ? 1.45 : 1;
    const enUpgLvl = (ug.en_regen || 0);
    const enRegenMul = (anIds.includes("energyRegen") ? 2 : 1) * (1 + enUpgLvl * 0.25);
    const extraBombs = anIds.includes("extraBombs") ? 4 : 0;
    const startArmorFull = anIds.includes("startArmor");
    const hordeSpd = anIds.includes("horde") ? 1.25 : 1;
    const ultCostMul = 1 - (ug.ult_red || 0) * 0.1;
    const cd0 = CLASSES[cls];
    const cdAdj = { ...cd0, ultCost: Math.max(5, ~~(cd0.ultCost * ultCostMul)) };
    const maxHpBonus = (ug.hp_up || 0);
    const startBombs = 3 + (ug.start_bomb || 0) + extraBombs;
    const startArmor = startArmorFull ? 5 : dc.armor;
    gs.current = {
      cls, cd:cdAdj, diff:dc, diffKey:d,
      upgrades: ug, anomalies: anIds, hordeSpd,
      enRegenMul, jumpMul,
      p: { x:100, y:GROUND_Y-PH, vy:0, og:true, f:1, atkCD:0, ultCD:0, inv:0, af:0, at:0,
           lives:dc.lives, hp:dc.hp+maxHpBonus, maxHp:dc.hp+maxHpBonus, armor:startArmor, maxArmor:5,
           en:0, maxEn:100, tDash:false, tTimer:0, tDir:0, weapon:"normal", weaponTimer:0,
           bombs:startBombs, breathT:0, sqY:0, recoil:0, aimX:1, aimY:0,
           coyote:0, jumpBuf:0, _jPrev:false, footT:0, landVy:0 },
      stage:1, maxStage:MAX_STAGE,
      cam:{ x:0, target:0 },
      proj:[], enemies:[], expl:[], parts:[], fx:[], pickups:[], drops:[], boss:null,
      level:genLevel(1),
      stars:Array.from({length:75},()=>({ x:Math.random()*CW, y:Math.random()*CH, sz:rng(0.5,2.8), sp:rng(0.3,1.5), c:["#fff","#aaccff","#ffddaa","#ff88cc"][~~(Math.random()*4)], tw:Math.random()*7, layer:Math.random() })),
      score:0, combo:0, comboT:0, wave:1, shake:0, time:0, vig:0,
      dustP:Array.from({length:24},()=>({ x:Math.random()*CW, y:rng(50,GROUND_Y-20), sz:rng(1,2.6), sp:rng(0.08,0.32), a:rng(0.03,0.08) })),
      ambientP:Array.from({length:28},()=>({ x:rng(0,CW), y:rng(20,CH-40), sz:rng(0.8,3.2), vx:rng(-0.3,0.3), vy:rng(-0.5,0.1), life:rng(60,200), ml:200, t:rng(0,7) })),
      skyBodies:Array.from({length:5},(_,i)=>({ x:rng(40,CW-40), y:rng(50,CH*0.45), r:rng(i===0?52:18,i===0?95:60), layer:rng(0.02,0.12), ring:Math.random()>0.55, ph:rng(0,7) })),
      hitFlash:0, screenFlash:0, sfCollected:0, auraTimer:0, phoenixUsed:false,
    };
  }, []);

  const advanceStage = useCallback(() => {
    const g = gs.current; if (!g) return false;
    const nextStage = (g.stage || 1) + 1;
    if (nextStage > (g.maxStage || MAX_STAGE)) return false;
    const p = g.p;
    gs.current = {
      ...g, stage:nextStage, boss:null,
      proj:[], enemies:[], expl:[], parts:[], fx:[], drops:[],
      pickups:[{ x:180, y:GROUND_Y-120, text:"NIVEAU "+nextStage, life:120, color:"#ffee00" }],
      level:genLevel(nextStage),
      cam:{ x:0, target:0 },
      combo:0, comboT:0, wave:1, shake:10, screenFlash:20, vig:0,
      p:{ ...p, x:100, y:GROUND_Y-PH, vy:0, og:true, inv:120, atkCD:0, ultCD:0,
          af:0, at:0, tDash:false, tTimer:0, tDir:0, sqY:0, recoil:0, aimX:1, aimY:0,
          hp:p.maxHp, armor:Math.min(p.maxArmor, p.armor+2), en:Math.min(p.maxEn, p.en+30),
          bombs:Math.min(9, p.bombs+1) },
    };
    sndStageComplete();
    return true;
  }, []);

  const sParts = useCallback((x, y, n, col, sr, spr) => {
    const g = gs.current; if (!g) return;
    if (g.parts.length > 80) return;
    const s = sr || [2,5], sp = spr || [1,5];
    for (let i = 0; i < n; i++) {
      const a = rng(0, Math.PI*2), v = rng(sp[0], sp[1]);
      g.parts.push({ x, y, vx:Math.cos(a)*v, vy:Math.sin(a)*v-1.5, life:rng(15,40), ml:40, sz:rng(s[0],s[1]), c:Array.isArray(col)?col[~~(Math.random()*col.length)]:col });
    }
  }, []);

  const sExpl = useCallback((x, y, sz, cols) => {
    const g = gs.current; if (!g) return;
    const s = sz || 1;
    g.expl.push({ x, y, r:0, mr:30*s, a:1, t:0, cols });
    sParts(x, y, ~~(6*s), cols || ["#ffee00","#ff6600","#ff2244","#fff"], [2,5], [1,5*s]);
    g.shake = Math.max(g.shake, 5*s);
  }, [sParts]);

  const killE = useCallback((e, g) => {
    sExpl(e.x+e.w/2, e.y+e.h/2, e.tp==="h"||e.tp==="er" ? 1.5 : e.tp==="boss" ? 3 : 1);
    sndExplosion(e.tp==="boss");
    g.combo++; g.comboT = 120;
    sndCombo(g.combo);
    const comboMul = g.anomalies && g.anomalies.includes("tripleCombo") ? 3 : 1;
    const maxCombo = g.anomalies && g.anomalies.includes("megaCombo") ? 15 : 10;
    const scoreMul = 1 + ((g.upgrades && g.upgrades.score_up) || 0) * 0.25;
    g.score += Math.round(e.pts * Math.min(g.combo, maxCombo) * comboMul * scoreMul);
    // Combo shield (upgrade)
    if (g.upgrades && g.upgrades.combo_shield && g.combo >= 5 && g.p.armor < g.p.maxArmor) {
      g.p.armor = Math.min(g.p.maxArmor, g.p.armor + 1);
      g.pickups.push({ x:e.x+e.w/2, y:e.y-20, text:"COMBO SHIELD!", life:50, color:"#4488ff" });
    }
    g.p.en = Math.min(g.p.maxEn, g.p.en + (e.tp==="h"||e.tp==="er" ? 12 : e.tp==="boss" ? 30 : 6));
    // Enemy name popup
    const eName = E_NAMES[e.tp];
    if (eName) g.pickups.push({ x:e.x+e.w/2, y:e.y-28, text:eName, life:45, color:"#ffffff99" });
    // Item drops
    const dx = e.x+e.w/2, dy = e.y+e.h/2;
    const dropBonus = (g.upgrades && g.upgrades.drop_bonus ? g.upgrades.drop_bonus * 0.2 : 0);
    const dr2 = (g.diff || DIFF.normal).dropRate + dropBonus;
    const dropChance = e.tp==="boss" ? 1 : (e.tp==="h"||e.tp==="er" ? 0.5 : 0.2) * dr2;
    if (Math.random() < dropChance) {
      const r = Math.random();
      let tp;
      if      (r < 0.35) tp = "potion";
      else if (r < 0.55) tp = "armor";
      else if (r < 0.72) tp = "energy";
      else if (r < 0.85) tp = "bomb_drop";
      else               tp = "big_potion";
      g.drops.push({ x:dx, y:dy, vy:-3, tp, life:420, bob:0, grounded:false });
    }
    // Star Fragment drops
    const sfAmt = e.tp==="boss" ? rng(15,20)|0 : (e.tp==="h"||e.tp==="er" ? rng(3,5)|0 : rng(1,2)|0);
    for (let si = 0; si < sfAmt; si++) {
      g.drops.push({ x:dx+rng(-20,20), y:dy, vy:rng(-4,-2), tp:"sf", life:480, bob:0, grounded:false });
    }
    // Boss extras
    if (e.tp === "boss") {
      g.drops.push({ x:dx-20, y:dy, vy:-4,   tp:"big_potion", life:600, bob:0, grounded:false });
      g.drops.push({ x:dx+20, y:dy, vy:-3.5,  tp:"armor",      life:600, bob:0, grounded:false });
      g.drops.push({ x:dx,    y:dy, vy:-5,    tp:"energy",     life:600, bob:0, grounded:false });
    }
  }, [sExpl]);

  const hurtPlayer = useCallback((g, dmg=1) => {
    const p = g.p;
    p.inv = 60; g.vig = 0.3;
    sndHurt();
    let left = Math.max(1, ~~dmg);
    while (left-- > 0 && p.lives > 0) {
      if (p.armor > 0) {
        p.armor--;
        sParts(p.x+PW/2, p.y+PH/2, 4, ["#4488ff","#88bbff","#aaddff"]);
        g.pickups.push({ x:p.x+PW/2, y:p.y-10, text:"ARMOR!", life:40, color:"#4488ff" });
      } else {
        p.hp--;
        sExpl(p.x+PW/2, p.y+PH/2, 0.5);
        if (p.hp <= 0) {
          p.lives--; p.hp = p.maxHp; p.armor = 0; p.inv = 120; g.vig = 0.5;
          sExpl(p.x+PW/2, p.y+PH/2, 1.2);
          // Phoenix revive: if unlocked and not used, convert a would-be gameover into a full reset
          if (p.lives <= 0 && g.upgrades && g.upgrades.phoenix && !g.phoenixUsed) {
            g.phoenixUsed = true;
            p.lives = 1; p.hp = p.maxHp; p.armor = p.maxArmor;
            p.inv = 180; p.en = p.maxEn;
            g.screenFlash = 30; g.shake = 15; g.vig = 0;
            sExpl(p.x+PW/2, p.y+PH/2, 3, ["#ffcc44","#fff","#ff8800"]);
            sParts(p.x+PW/2, p.y+PH/2, 20, ["#ffcc44","#ff8800","#fff"], [3,6], [3,7]);
            g.pickups.push({ x:p.x+PW/2, y:p.y-20, text:"★ PHENIX ★", life:120, color:"#ffcc44" });
            sndUlt("pyro");
          }
        }
      }
    }
  }, [sExpl, sParts]);

  const spawnEAt = useCallback((wx, tp) => {
    const g = gs.current; if (!g) return;
    const dc = g.diff || DIFF.normal;
    const stageIdx = Math.max(1, g.stage || 1);
    const stageHpMul = 1 + (stageIdx-1) * 0.45;
    const stageSpdMul = 1 + (stageIdx-1) * 0.12;
    const stageShootMul = stageIdx >= 2 ? 0.85 : 1;
    const bs = (0.6 + g.wave * 0.05) * dc.eSpdMul * stageSpdMul * (g.hordeSpd || 1);
    const hpM = dc.eHpMul * stageHpMul, sM = dc.eShootMul * stageShootMul;
    let e;
    if      (tp==="w")  e = { tp:"w",  x:wx, y:GROUND_Y-36,          w:32, h:36, hp:~~((2+~~(g.wave/3))*hpM), mhp:~~((2+~~(g.wave/3))*hpM), vx:(Math.random()>0.5?1:-1)*bs, shootT:rng(150*sM,300*sM), an:0, anT:0, pts:100, frz:0 };
    else if (tp==="f")  { const by=rng(80,GROUND_Y-130); e = { tp:"f", x:wx, y:by, w:36, h:28, hp:~~((1+~~(g.wave/4))*hpM), mhp:~~((1+~~(g.wave/4))*hpM), vx:(Math.random()>0.5?1:-1)*(bs+0.2), baseY:by, flyT:rng(0,7), shootT:rng(200*sM,350*sM), an:0, anT:0, pts:150, frz:0 }; }
    else if (tp==="h")  e = { tp:"h",  x:wx, y:GROUND_Y-50,          w:46, h:50, hp:~~((5+g.wave)*hpM), mhp:~~((5+g.wave)*hpM), vx:(Math.random()>0.5?1:-1)*bs*0.3, shootT:rng(120*sM,220*sM), an:0, anT:0, pts:300, frz:0 };
    else if (tp==="mc") e = { tp:"mc", x:wx, y:GROUND_Y-30,          w:34, h:30, hp:~~((3+~~(g.wave/3))*hpM), mhp:~~((3+~~(g.wave/3))*hpM), vx:(Math.random()>0.5?1:-1)*bs*1.2, shootT:rng(100*sM,200*sM), an:0, anT:0, pts:180, frz:0 };
    else if (tp==="er") e = { tp:"er", x:wx, y:GROUND_Y-55,          w:40, h:55, hp:~~((6+g.wave)*hpM), mhp:~~((6+g.wave)*hpM), vx:(Math.random()>0.5?1:-1)*bs*0.4, shootT:rng(80*sM,160*sM), an:0, anT:0, pts:350, frz:0, eruptT:0 };
    if (!e) return;
    e.hp = Math.max(1,e.hp); e.mhp = Math.max(1,e.mhp);
    g.enemies.push(e);
  }, []);

  const atk = useCallback(() => {
    const g = gs.current; if (!g) return;
    const p = g.p; if (p.atkCD > 0) return;
    const cx = p.x+PW/2+p.aimX*PW*0.4, cy = p.y+PH/2+p.aimY*PH*0.3;
    p.recoil = 4;
    const w = p.weapon;
    const ax = p.aimX, ay = p.aimY;
    const spd = (s) => ({ vx:ax*s+rng(-0.3,0.3), vy:ay*s+rng(-0.3,0.3) });
    sndShoot(g.cls, w);
    if (g.cls === "pyro") {
      if      (w==="heavy")  { g.proj.push({ x:cx,y:cy,vx:ax*6,vy:ay*6,tp:"fire",dmg:5,sz:14,life:60,own:"p" }); p.atkCD=20; }
      else if (w==="shotgun"){ const ba=Math.atan2(ay,ax); for(let i=0;i<5;i++){ const an=ba+(i-2)*0.18; g.proj.push({ x:cx,y:cy,vx:Math.cos(an)*9,vy:Math.sin(an)*9,tp:"fire",dmg:2,sz:6,life:25,own:"p" }); } p.atkCD=22; }
      else if (w==="laser")  { g.proj.push({ x:cx,y:cy,vx:ax*16,vy:ay*16,tp:"fire",dmg:4,sz:4,life:60,own:"p",laser:true }); p.atkCD=5; }
      else                   { g.proj.push({ x:cx,y:cy,vx:ax*8+rng(-0.3,0.3),vy:ay*8+rng(-0.3,0.3),tp:"fire",dmg:2,sz:8,life:80,own:"p" }); p.atkCD=g.cd.atkCD; }
    } else if (g.cls === "cryo") {
      if      (w==="heavy")  { for(let i=0;i<5;i++) g.proj.push({ x:cx+ax*i*4,y:cy+ay*i*4,...spd(11),tp:"frost",dmg:2,sz:5,life:35,own:"p" }); p.atkCD=10; }

      else g.proj.push({ x:cx,y:cy,vx:ax*12,vy:ay*12,tp:"lbolt",dmg:3,sz:5,life:40,own:"p" });
      p.atkCD = w==="laser" ? 10 : g.cd.atkCD;
    } else if (g.cls === "void_c") {

      else if (w==="shotgun"){ const ba=Math.atan2(ay,ax); for(let i=0;i<4;i++){ const an=ba+(i-1.5)*0.2; g.proj.push({ x:cx,y:cy,vx:Math.cos(an)*9,vy:Math.sin(an)*9,tp:"void",dmg:2,sz:5,life:35,own:"p" }); } p.atkCD=20; }
      else if (w==="laser")  { g.proj.push({ x:cx,y:cy,vx:ax*16,vy:ay*16,tp:"void",dmg:4,sz:4,life:55,own:"p",laser:true }); p.atkCD=5; }
      else                   { g.proj.push({ x:cx,y:cy,vx:ax*9,vy:ay*9,tp:"void",dmg:2,sz:7,life:60,own:"p" }); p.atkCD=g.cd.atkCD; }

  const ult = useCallback(() => {
    const g = gs.current; if (!g) return;
    const p = g.p, cd = g.cd;
    if (p.en < cd.ultCost || p.ultCD > 0) return;

    else if (g.cls==="cryo")   { sExpl(cx,cy,3,["#44ccff","#aaeeff","#fff"]); g.enemies.forEach(e=>{ if(dst(cx,cy,e.x+e.w/2,e.y+e.h/2)<180){e.hp-=4;e.frz=180;} }); g.shake=12; }
    else if (g.cls==="foudre") { p.tDash=true; p.tTimer=20; p.tDir=p.f; p.inv=25; g.shake=6; }
    else if (g.cls==="void_c") { g.fx.push({ tp:"bh",x:cx+p.f*150,y:cy-20,life:180,ml:180,r:0,mr:100,dt:0 }); g.shake=10; }
  }, [sExpl]);

  // ══════════════════════════════════════════════════
  //  MAIN GAME LOOP
  // ══════════════════════════════════════════════════
  const loop = useCallback(() => {
    const g = gs.current, cv = canvasRef.current;
    if (!g || !cv) return;

    // Pause check
    if (pausedRef.current) { raf.current = requestAnimationFrame(loop); return; }

    const dpr = Math.max(1, Math.min(DPR_CAP, window.devicePixelRatio || 1));
    const targetW = Math.floor(CW*dpr), targetH = Math.floor(CH*dpr);
    if (cv.width !== targetW || cv.height !== targetH) { cv.width=targetW; cv.height=targetH; }
    const ctx = cv.getContext("2d"), k = keys.current, p = g.p, cd = g.cd, lv = g.level;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = true;
    g.time++;
    const viewW = VIEW_W;
    const renderStress = !!g.boss || g.proj.length>18 || g.enemies.length>7 || g.fx.length>3;

    // --- UPDATE ---
    if (p.tDash) {
      p.tTimer--; p.x += p.tDir*18;
      g.enemies.forEach(e=>{ if(p.x<e.x+e.w&&p.x+PW>e.x&&p.y<e.y+e.h&&p.y+PH>e.y){e.hp-=5;sParts(e.x+e.w/2,e.y+e.h/2,3,["#ffdd00","#fff"]);} });
      sParts(p.x+PW/2, p.y+PH/2, 1, ["#ffdd00","#ffff88"], [3,6], [0.5,2]);
      if (p.tTimer <= 0) p.tDash = false;
    } else {
      let moving = false;
      if (k["q"]||k["Q"]||k["ArrowLeft"])  { p.x-=SPD; p.f=-1; p.at++; moving=true; }
      else if (k["d"]||k["D"]||k["ArrowRight"])              { p.x+=SPD; p.f=1;  p.at++; moving=true; }
      // Jump: buffered + coyote time + variable jump height
      const _jkey = !!(k[" "]||k["w"]||k["W"]);
      if (_jkey && !p._jPrev) p.jumpBuf = 10;
      p._jPrev = _jkey;
      if (p.jumpBuf > 0) p.jumpBuf--;
      if (p.jumpBuf > 0 && (p.og || (p.coyote||0) > 0)) {
        p.vy = JUMP*(g.jumpMul||1); p.og=false; p.sqY=-5;
        p.coyote=0; p.jumpBuf=0;
        sParts(p.x+PW/2, p.y+PH-2, 4, ["#ffffff33","#aabbff44","#ddddff55"], [1,3], [0.5,2]);
      }
      // Variable jump height — release early for a shorter hop
      if (!_jkey && p.vy < -4) p.vy *= 0.7;
      // Footstep dust while running on ground
      if (moving && p.og) {
        p.footT = (p.footT||0) + 1;
        if (p.footT > 10) {
          p.footT = 0;
          sParts(p.x+PW/2-p.f*6, p.y+PH-2, 1, ["#ffffff22","#aabbcc33"], [1,2], [0.3,1]);
        }
      }
    }
    p.x = Math.max(0, Math.min(LEVEL_W-PW, p.x));

    const aUp = k["z"]||k["Z"]||k["ArrowUp"];
    const aDn = k["s"]||k["S"]||k["ArrowDown"];
    if      (aUp && !aDn) { p.aimX=p.f*0.5; p.aimY=-1; }
    else if (aDn && !aUp) { p.aimX=p.f*0.5; p.aimY=1;  }
    else                  { p.aimX=p.f; p.aimY=0; }
    const aMag = Math.sqrt(p.aimX*p.aimX+p.aimY*p.aimY);
    if (aMag > 0) { p.aimX/=aMag; p.aimY/=aMag; }

    if (k["e"]||k["E"]) atk();
    if (k["f"]||k["F"]||k["k"]||k["K"]) { if (!k._ul) { ult(); k._ul=true; } } else { k._ul=false; }
    if (g.cls==="void_c"&&(k["l"]||k["L"])) { if(!k._tp&&p.en>=8){p.en-=8;sParts(p.x+PW/2,p.y+PH/2,4,["#bb44ff","#dd88ff"],[2,5]);p.x+=p.f*120;p.x=Math.max(0,Math.min(LEVEL_W-PW,p.x));p.inv=Math.max(p.inv,15);sParts(p.x+PW/2,p.y+PH/2,10,["#bb44ff","#dd88ff"],[2,5]);k._tp=true;} } else { k._tp=false; }
    if (k["a"]||k["A"]) { if(!k._bm&&p.bombs>0){p.bombs--;g.proj.push({ x:p.x+PW/2,y:p.y,vx:p.f*5,vy:-7,own:"p",sz:6,tp:"bomb",dmg:8,life:80 });sndShoot(g.cls,"bomb");k._bm=true;} } else { k._bm=false; }

    // Physics
    if (!p.tDash) { p.vy+=GRAVITY; p.y+=p.vy; }
    const _wasAir = !p.og;
    p.landVy = p.vy;
    p.og = false;
    if (p.y+PH >= GROUND_Y) { p.y=GROUND_Y-PH; if(p.vy>3)p.sqY=4; p.vy=0; p.og=true; }
    [...lv.plats,...lv.movPlats].forEach(pl=>{ if(p.vy>=0&&p.x+PW>pl.x&&p.x<pl.x+pl.w&&p.y+PH>=pl.y&&p.y+PH<=pl.y+pl.h+10){p.y=pl.y-PH;p.vy=0;p.og=true;if(pl.vx)p.x+=pl.vx;} });
    // Coyote time tracking: remember ground contact for 7 frames after leaving
    if (p.og) p.coyote = 7; else if (p.coyote > 0) p.coyote--;
    // Landing dust on hard landings
    if (_wasAir && p.og && p.landVy > 7) {
      sParts(p.x+PW/2, p.y+PH-1, ~~(Math.min(8, p.landVy*0.7)), ["#ffffff44","#aabbcc55","#ccccff66"], [1,3], [1,3]);
      if (p.landVy > 11) g.shake = Math.max(g.shake, 3);
    }
    if (p.atkCD>0)p.atkCD--; if(p.ultCD>0)p.ultCD--; if(p.inv>0)p.inv--;
    if (p.at>8){p.af=(p.af+1)%4;p.at=0;}
    const enRegenMul = g.enRegenMul || 1;
    p.en = Math.min(p.maxEn, p.en+0.08*enRegenMul);
    p.breathT+=0.04; p.sqY*=0.85; if(p.recoil>0)p.recoil*=0.7;
    if(!p.og&&p.sqY===0)p.sqY=p.vy<0?-3:2;
    if(p.weaponTimer>0){p.weaponTimer--;if(p.weaponTimer<=0)p.weapon="normal";}
    if(g.comboT>0){g.comboT--;if(g.comboT<=0)g.combo=0;}

    // Aura anomaly
    if (g.anomalies && g.anomalies.includes("aura")) {
      g.auraTimer = (g.auraTimer||0)+1;
      if (g.auraTimer >= 90) {
        g.auraTimer = 0;
        g.enemies.forEach(e=>{ if(dst(p.x+PW/2,p.y+PH/2,e.x+e.w/2,e.y+e.h/2)<70){e.hp-=1;sParts(e.x+e.w/2,e.y+e.h/2,2,[cd.color,"#fff"]);} });
      }
    }

    // Camera
    g.cam.target = p.x - viewW*0.35;
    g.cam.x += (g.cam.target-g.cam.x)*0.08;
    g.cam.x = Math.max(0, Math.min(LEVEL_W-viewW, g.cam.x));
    const camX = g.cam.x;
    const stageZones = STAGE_ZONES[g.stage||1] || [0,1,2];
    const zonePosIdx = Math.min(2, ~~(p.x/ZONE_W));
    const zoneIdx = Math.min(ZONES.length-1, stageZones[zonePosIdx]);

    // Moving platforms
    lv.movPlats.forEach(mp=>{
      mp.t+=0.02; const oldX=mp.x;
      if(mp.ax!==undefined) mp.x=mp.ax+(mp.bx-mp.ax)*((Math.sin(mp.t*mp.spd)+1)/2);
      if(mp.ay!==undefined) mp.y=mp.ay+(mp.by-mp.ay)*((Math.sin(mp.t*mp.spd)+1)/2);
      mp.vx=mp.x-oldX;
    });

    // Arena logic
    lv.arenas.forEach(ar=>{
      if(ar.cleared)return;
      if(!ar.active&&p.x>ar.x+ar.w*0.3&&p.x<ar.x+ar.w){ar.active=true;ar.spawnT=50;ar.locked=false;}
      if(ar.active&&!ar.cleared){
        ar.spawnT--;
        if(ar.spawnT<=0&&ar.curWave<ar.waves.length){
          ar.waves[ar.curWave].forEach(s=>{for(let i=0;i<s.n;i++)spawnEAt(ar.x+rng(30,ar.w-30),s.t);});
          ar.curWave++;ar.spawnT=200;ar.locked=true;
        }
        if(ar.locked){p.x=Math.max(ar.x+8,Math.min(ar.x+ar.w-PW-8,p.x));}
        const arEn=g.enemies.filter(e=>e.x>ar.x-40&&e.x<ar.x+ar.w+40);
        if(ar.curWave>=ar.waves.length&&arEn.length===0){
          if(ar.boss&&!ar.bossSpawned){
            const bx=ar.x+ar.w/2-25;
            const bossType=ar.bossType||"garde";
            const bHpBase=(g.diff||DIFF.normal).bossHp;
            const bHpMul=g.stage===4?2.5:g.stage===3?2.0:g.stage>=2?1.7:1.0;
            const bHp=~~(bHpBase*bHpMul);
            const bW=bossType==="final"?70:bossType==="vortex"?55:50;
            const bH=bossType==="final"?90:bossType==="vortex"?60:70;
            g.boss={ tp:"boss",bossType,x:bx,y:GROUND_Y-bH,w:bW,h:bH,hp:bHp,mhp:bHp,
              vx:0.5*(g.diff||DIFF.normal).eSpdMul,shootT:50,phase:0,phaseT:0,an:0,anT:0,pts:3000,frz:0,
              arena:ar,teleportTimer:0,chargeTimer:0 };
            g.enemies.push(g.boss);
            ar.bossSpawned=true;
            g.screenFlash=15;
          } else if(!ar.boss||ar.bossSpawned){
            ar.cleared=true;ar.locked=false;
            const _sMul = 1 + ((g.upgrades&&g.upgrades.score_up)||0) * 0.25;
            g.score += Math.round(500 * _sMul);
            if(!ar.boss){g.pickups.push({ x:ar.x+ar.w/2,y:GROUND_Y-50,text:"ARENA CLEAR!",life:90,color:"#ffee00" });sndArenaComplete();}
          }
        }
      }
    });

    // Hazards
    if(p.inv<=0){lv.hazards.forEach(h=>{
      if(h.tp==="laser"){h.timer=(h.timer||0)+0.02;if(Math.sin(h.timer)>0.3){if(p.x+PW>h.x-6&&p.x<h.x+6&&p.y+PH>h.y&&p.y<h.y+(h.h||120))hurtPlayer(g);}}
      else{if(p.x+PW>h.x&&p.x<h.x+h.w&&p.y+PH>GROUND_Y-10)hurtPlayer(g);}
    });}

    // Platform cleanup
    lv.plats=lv.plats.filter(pl=>{if(pl.destr&&pl.hp<=0){sParts(pl.x+pl.w/2,pl.y,4,["#aa6644","#664422","#ffaa66"]);return false;}return true;});
    g.proj.forEach(b=>{if(b.own==="e"){lv.plats.forEach(pl=>{if(pl.destr&&b.x>pl.x&&b.x<pl.x+pl.w&&b.y>pl.y-4&&b.y<pl.y+pl.h+4)pl.hp--;});}});

    // Trigger spawns
    lv.spawns.forEach(sp=>{if(!sp.triggered&&sp.x>camX-100&&sp.x<camX+viewW+100&&Math.abs(sp.x-p.x)<viewW){sp.triggered=true;spawnEAt(sp.x,sp.tp);}});
    g.wave=Math.max(1,~~(p.x/(LEVEL_W/10))+1);

    // Crate pickup
    lv.crates.forEach(cr=>{
      if(!cr.alive)return;
      if(Math.abs(p.x+PW/2-cr.x)<30&&Math.abs(p.y+PH/2-cr.y)<30){
        cr.alive=false;sExpl(cr.x,cr.y,0.4,["#ffee00","#fff"]);
        if(cr.tp==="heavy"||cr.tp==="shotgun"||cr.tp==="laser"){p.weapon=cr.tp;p.weaponTimer=600;g.pickups.push({ x:cr.x,y:cr.y-20,text:cr.tp.toUpperCase()+"!",life:60,color:"#ffee00" });sndPickup();}
        else if(cr.tp==="bomb"){p.bombs=Math.min(9,p.bombs+3);g.pickups.push({ x:cr.x,y:cr.y-20,text:"BOMBS +3",life:60,color:"#44ff44" });sndPickup();}
        else if(cr.tp==="food"){p.hp=Math.min(p.maxHp,p.hp+2);g.pickups.push({ x:cr.x,y:cr.y-20,text:"HP UP!",life:60,color:"#ff4466" });sndPickup();}
        else if(cr.tp==="medal"){const _sm=1+((g.upgrades&&g.upgrades.score_up)||0)*0.25;const bonus=Math.round(1000*_sm);g.score+=bonus;g.pickups.push({ x:cr.x,y:cr.y-20,text:"+"+bonus,life:60,color:"#ffaa00" });sndPickup();}
        else if(cr.tp==="sf"){const amt=rng(3,8)|0;g.sfCollected=(g.sfCollected||0)+amt;g.pickups.push({ x:cr.x,y:cr.y-20,text:"FRAGMENTS +"+amt,life:60,color:"#ffcc00" });sndSf();}
      }
    });
    g.pickups=g.pickups.filter(pk=>{pk.y-=1;pk.life--;return pk.life>0;});

    // Item drops update
    g.drops=g.drops.filter(dr=>{
      dr.life--;
      if(!dr.grounded){dr.vy+=0.35;dr.y+=dr.vy;if(dr.y>=GROUND_Y-10){dr.y=GROUND_Y-10;dr.grounded=true;dr.vy=0;}}
      dr.bob+=0.06;
      if(Math.abs(p.x+PW/2-dr.x)<24&&Math.abs(p.y+PH/2-dr.y)<24){
        if(dr.tp==="potion"     ){p.hp=Math.min(p.maxHp,p.hp+1);g.pickups.push({ x:dr.x,y:dr.y-16,text:"HP +1",life:60,color:"#ff4488" });sndPickup();}
        else if(dr.tp==="big_potion"){p.hp=p.maxHp;g.pickups.push({ x:dr.x,y:dr.y-16,text:"FULL HP!",life:70,color:"#ff2266" });sndPickup();}
        else if(dr.tp==="armor" ){p.armor=Math.min(p.maxArmor,p.armor+2);g.pickups.push({ x:dr.x,y:dr.y-16,text:"ARMOR +2",life:60,color:"#4488ff" });sndPickup();}
        else if(dr.tp==="energy"){p.en=Math.min(p.maxEn,p.en+30);g.pickups.push({ x:dr.x,y:dr.y-16,text:"ENERGY +30",life:60,color:"#44ffaa" });sndPickup();}
        else if(dr.tp==="bomb_drop"){p.bombs=Math.min(9,p.bombs+2);g.pickups.push({ x:dr.x,y:dr.y-16,text:"BOMBS +2",life:60,color:"#44ff44" });sndPickup();}
        else if(dr.tp==="sf"   ){g.sfCollected=(g.sfCollected||0)+1;g.pickups.push({ x:dr.x,y:dr.y-16,text:"FRAGMENT",life:45,color:"#ffcc00" });sndSf();}
        sParts(dr.x,dr.y,5,dr.tp==="potion"||dr.tp==="big_potion"?["#ff4488","#ff88aa","#fff"]:dr.tp==="armor"?["#4488ff","#88bbff","#fff"]:dr.tp==="sf"?["#ffcc00","#ffee88","#fff"]:["#44ffaa","#88ffcc","#fff"]);
        return false;
      }
      if(dr.life<60&&dr.life%8<4)return true;
      return dr.life>0;
    });

    // World random drops (reduced frequency)
    if(g.time%800===0&&Math.random()<0.35){const rdx=p.x+rng(-200,200);const rtp=Math.random()<0.5?"potion":Math.random()<0.7?"armor":"energy";g.drops.push({ x:Math.max(20,Math.min(LEVEL_W-20,rdx)),y:GROUND_Y-100,vy:0,tp:rtp,life:480,bob:0,grounded:false });}

    // Projectiles
    g.proj=g.proj.filter(b=>{
      b.x+=b.vx;b.y+=b.vy;b.life--;
      if(b.tp==="bomb"){b.vy+=0.3;if(b.y>=GROUND_Y-6||b.life<=0){sExpl(b.x,b.y,2.5,["#ffee00","#ff6600","#fff"]);sndExplosion(true);const _dMul=1+((g.upgrades&&g.upgrades.dmg_up)||0)*0.1;g.enemies.forEach(e=>{if(dst(b.x,b.y,e.x+e.w/2,e.y+e.h/2)<100){e.hp-=Math.max(1,Math.round(b.dmg*_dMul));}});return false;}}
      if(b.life<=0||b.x<camX-100||b.x>camX+viewW+100||b.y<-30||b.y>CH+30)return false;
      if(b.own==="p"&&b.tp!=="bomb"){
        for(let e of g.enemies){
          if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
            const dMul = 1 + ((g.upgrades&&g.upgrades.dmg_up)||0) * 0.1;
            const finalD = Math.max(1, Math.round(b.dmg * dMul));
            e.hp-=finalD;e.hitF=Math.max(e.hitF||0, finalD>=4?8:5);
            if(b.tp==="frost")e.frz=Math.max(e.frz,45);
            if(b.tp==="fire"){sExpl(b.x,b.y,0.5,["#ff6622","#ffaa00"]);g.enemies.forEach(e2=>{if(e2!==e&&dst(b.x,b.y,e2.x+e2.w/2,e2.y+e2.h/2)<40)e2.hp-=Math.max(1,Math.round(dMul));});}
            else sParts(b.x,b.y,2,["#fff",cd.color]);
            sndImpact();
            g.hitFlash=finalD>=4?5:3;
            // Damage number popup
            if(g.pickups.length<40){
              const dmgCol = finalD>=5?"#ff4422" : finalD>=3?"#ffcc22" : "#ffffff";
              g.pickups.push({ x:b.x+rng(-6,6), y:e.y-4, text:"-"+finalD, life:30, color:dmgCol, small:true });
            }
            if(finalD>=4&&e.tp!=="boss") g.shake=Math.max(g.shake,2);
            p.en=Math.min(p.maxEn,p.en+3);
            if(b.laser){b.dmg=Math.max(1,b.dmg-1);break;}
            return false;
          }
        }
      } else if(b.own==="e"){
        if(p.inv<=0&&b.x>p.x&&b.x<p.x+PW&&b.y>p.y&&b.y<p.y+PH){hurtPlayer(g,b.dmg||1);return false;}
      }
      return true;
    });

    // Effects
    g.fx=g.fx.filter(ef=>{
      ef.life--;
      if(ef.tp==="wall"){
        ef.dt--;if(ef.dt<=0){ef.dt=15;const fx=ef.f===1?ef.x:ef.x-ef.w;g.enemies.forEach(e=>{if(e.x+e.w>fx&&e.x<fx+ef.w&&e.y+e.h>ef.y&&e.y<ef.y+ef.h+20){e.hp-=2;sParts(e.x+e.w/2,e.y+e.h/2,3,["#ff6622","#ffaa00"]);}});}
        if(g.time%8===0){const fx=ef.f===1?ef.x:ef.x-ef.w;sParts(fx+Math.random()*ef.w,ef.y+ef.h,2,["#ff6622","#ffaa00","#ff2200"],[2,5],[0.5,2]);}
      }else if(ef.tp==="bh"){
        ef.r=Math.min(ef.mr,ef.r+2);ef.dt--;
        g.enemies.forEach(e=>{const d=dst(ef.x,ef.y,e.x+e.w/2,e.y+e.h/2);if(d<ef.r+60){const a=Math.atan2(ef.y-(e.y+e.h/2),ef.x-(e.x+e.w/2));const pl=Math.min(3,80/(d+1));e.x+=Math.cos(a)*pl;e.y+=Math.sin(a)*pl;}if(d<ef.r*0.5&&ef.dt<=0){e.hp-=2;sParts(e.x+e.w/2,e.y+e.h/2,2,["#bb44ff","#fff"]);}});
        if(ef.dt<=0)ef.dt=20;
      }
      return ef.life>0;
    });

    // Enemies update
    let enemyShotCount=0;
    g.proj.forEach(b=>{if(b.own==="e")enemyShotCount++;});
    const dc0=g.diff||DIFF.normal;
    g.enemies.forEach(e=>{
      if(e.frz>0){e.frz--;e.x+=e.vx*0.15;}else{e.x+=e.vx;}
      e.anT++;if(e.anT>12){e.an=(e.an+1)%4;e.anT=0;}
      if(e.tp==="f"){e.flyT+=0.04;e.y=e.baseY+Math.sin(e.flyT)*30;}

      // BOSS BEHAVIORS
      if(e.tp==="boss"){
        const bt=e.bossType||"garde";
        const hpPct=e.hp/e.mhp;

        if(bt==="garde"||bt==="seign"){
          // Phase transitions
          const ph1Thresh=bt==="seign"?0.66:0.5;
          const ph2Thresh=bt==="seign"?0.33:0.25;
          if(e.phase===0&&hpPct<ph1Thresh){e.phase=1;g.screenFlash=12;sExpl(e.x+e.w/2,e.y+e.h/2,2);}
          if(e.phase===1&&hpPct<ph2Thresh){e.phase=2;g.screenFlash=12;sExpl(e.x+e.w/2,e.y+e.h/2,2.5);}
          e.phaseT++;if(e.phaseT>250){e.phase=Math.max(e.phase,(e.phase+1)%3);e.phaseT=0;}
          if(e.arena&&(e.x<e.arena.x+15||e.x+e.w>e.arena.x+e.arena.w-15))e.vx*=-1;
          // Charge for seign
          if(bt==="seign"&&e.phase>=1){
            e.chargeTimer=(e.chargeTimer||0)+1;
            if(e.chargeTimer>=120){e.vx=(p.x>e.x+e.w/2?1:-1)*5;e.chargeTimer=0;}
            if(Math.abs(e.vx)>2)e.vx*=0.93;
          }
        }

        else if(bt==="vortex"){
          // Phase transitions
          if(e.phase===0&&hpPct<0.6){e.phase=1;g.screenFlash=12;sExpl(e.x+e.w/2,e.y+e.h/2,2,["#cc00ff","#fff"]);}
          if(e.phase===1&&hpPct<0.3){e.phase=2;g.screenFlash=15;sExpl(e.x+e.w/2,e.y+e.h/2,2.5,["#cc00ff","#fff"]);}
          // Teleport
          const tpInterval=e.phase>=2?80:150;
          e.teleportTimer=(e.teleportTimer||0)+1;
          if(e.teleportTimer>=tpInterval){
            const oldX=e.x;
            e.x=e.arena.x+rng(30,e.arena.w-e.w-30);
            e.y=GROUND_Y-e.h;
            e.teleportTimer=0;
            g.expl.push({ x:oldX+e.w/2,y:e.y+e.h/2,r:0,mr:35,a:1,t:0,cols:["#cc00ff","#660099","#fff"] });
            g.expl.push({ x:e.x+e.w/2,y:e.y+e.h/2,r:0,mr:35,a:1,t:0,cols:["#cc00ff","#660099","#fff"] });
            sParts(e.x+e.w/2,e.y+e.h/2,8,["#cc00ff","#dd88ff","#fff"],[2,5],[2,5]);
          }
          if(e.shootT<=0&&e.frz<=0){
            const shots=e.phase===0?4:e.phase===1?6:8;
            const cx=e.x+e.w/2,cy=e.y+e.h/2;
            const rotOff=e.phase===1?g.time*0.02:0;
            for(let si=0;si<shots;si++){
              const ang=(Math.PI*2*si/shots)+rotOff;
              const spd=2.8+e.phase*0.5;
              if(enemyShotCount<MAX_ENEMY_PROJECTILES){g.proj.push({ x:cx,y:cy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,own:"e",sz:4,tp:"eshot",dmg:dc0.eDmg,life:180 });enemyShotCount++;}
            }
            e.shootT=e.phase>=2?55:85;
          }
        }

        else if(bt==="final"){
          // Phase transitions
          if(e.phase===0&&hpPct<0.75){e.phase=1;g.screenFlash=15;g.shake=18;sExpl(e.x+e.w/2,e.y+e.h/2,2.5,["#ffaa00","#fff"]);}
          if(e.phase===1&&hpPct<0.5) {e.phase=2;g.screenFlash=15;g.shake=18;sExpl(e.x+e.w/2,e.y+e.h/2,2.8,["#aa00ff","#fff"]);}
          if(e.phase===2&&hpPct<0.25){e.phase=3;g.screenFlash=20;g.shake=22;sExpl(e.x+e.w/2,e.y+e.h/2,3.2,["#ff0000","#fff"]);}

          if(e.phase===0){
            // Float above, rain projectiles
            const targetY=80;
            e.y+=(targetY-e.y)*0.02;
            if(e.shootT<=0){const rx=e.arena.x+rng(20,e.arena.w-20);if(enemyShotCount<MAX_ENEMY_PROJECTILES){g.proj.push({ x:rx,y:70,vx:0,vy:2.6,own:"e",sz:5,tp:"eshot",dmg:dc0.eDmg,life:200 });enemyShotCount++;}e.shootT=22;}
          } else if(e.phase===1){
            const targetY=GROUND_Y-e.h;
            e.y+=(targetY-e.y)*0.03;
            e.chargeTimer=(e.chargeTimer||0)+1;
            if(e.chargeTimer>=120){e.vx=(p.x>e.x+e.w/2?1:-1)*5;e.chargeTimer=0;}
            if(Math.abs(e.vx)>2)e.vx*=0.93; else if(e.arena&&(e.x<e.arena.x+15||e.x+e.w>e.arena.x+e.arena.w-15))e.vx*=-1;
            if(e.shootT<=0){const cx=e.x+e.w/2,cy=e.y+e.h/2;const dx=p.x-cx,dy=p.y-cy,dm=Math.sqrt(dx*dx+dy*dy)||1;for(let si=-1;si<=1;si++){if(enemyShotCount<MAX_ENEMY_PROJECTILES){g.proj.push({ x:cx,y:cy,vx:dx/dm*3+si*0.8,vy:dy/dm*3,own:"e",sz:5,tp:"eshot",dmg:dc0.eDmg,life:160 });enemyShotCount++;}}e.shootT=55;}
          } else if(e.phase===2){
            if(e.arena&&(e.x<e.arena.x+15||e.x+e.w>e.arena.x+e.arena.w-15))e.vx*=-1;
            if(!e.dronesSpawned){e.dronesSpawned=true;e.drones=[{angle:0,r:80,shootT:0},{angle:Math.PI,r:80,shootT:30}];}
            e.drones.forEach(dr=>{dr.angle+=0.035;dr.x=e.x+e.w/2+Math.cos(dr.angle)*dr.r;dr.y=e.y+e.h/2+Math.sin(dr.angle)*dr.r;dr.shootT++;if(dr.shootT>90){const dx=p.x-dr.x,dy=p.y-dr.y,dm=Math.sqrt(dx*dx+dy*dy)||1;if(enemyShotCount<MAX_ENEMY_PROJECTILES){g.proj.push({ x:dr.x,y:dr.y,vx:dx/dm*2.5,vy:dy/dm*2.5,own:"e",sz:4,tp:"eshot",dmg:dc0.eDmg,life:160 });enemyShotCount++;}dr.shootT=0;}});
            if(e.shootT<=0){const cx=e.x+e.w/2,cy=e.y+e.h/2;const dx=p.x-cx,dy=p.y-cy,dm=Math.sqrt(dx*dx+dy*dy)||1;for(let si=-1;si<=1;si++){if(enemyShotCount<MAX_ENEMY_PROJECTILES){g.proj.push({ x:cx,y:cy,vx:dx/dm*3+si,vy:dy/dm*3,own:"e",sz:5,tp:"eshot",dmg:dc0.eDmg,life:160 });enemyShotCount++;}}e.shootT=45;}
          } else if(e.phase===3){
            // RAGE: teleport + 5-way + drones
            e.teleportTimer=(e.teleportTimer||0)+1;
            if(e.teleportTimer>=100){e.x=e.arena.x+rng(30,e.arena.w-e.w-30);e.teleportTimer=0;sParts(e.x+e.w/2,e.y+e.h/2,8,["#ff0000","#ff8800","#fff"],[2,5],[2,6]);}
            if(e.drones){e.drones.forEach(dr=>{dr.angle+=0.055;dr.x=e.x+e.w/2+Math.cos(dr.angle)*dr.r;dr.y=e.y+e.h/2+Math.sin(dr.angle)*dr.r;dr.shootT++;if(dr.shootT>55){const dx=p.x-dr.x,dy=p.y-dr.y,dm=Math.sqrt(dx*dx+dy*dy)||1;if(enemyShotCount<MAX_ENEMY_PROJECTILES){g.proj.push({ x:dr.x,y:dr.y,vx:dx/dm*3,vy:dy/dm*3,own:"e",sz:4,tp:"eshot",dmg:dc0.eDmg,life:160 });enemyShotCount++;}dr.shootT=0;}});}
            if(e.shootT<=0){const cx=e.x+e.w/2,cy=e.y+e.h/2;const dx=p.x-cx,dy=p.y-cy,dm=Math.sqrt(dx*dx+dy*dy)||1;for(let si=-2;si<=2;si++){if(enemyShotCount<MAX_ENEMY_PROJECTILES){g.proj.push({ x:cx,y:cy,vx:dx/dm*3.5+si*0.65,vy:dy/dm*3.5,own:"e",sz:5,tp:"eshot",dmg:dc0.eDmg+1,life:160 });enemyShotCount++;}}e.shootT=32;}
          }
        }

        // Shared boss shoot (garde/seign)
        if((bt==="garde"||bt==="seign")&&e.shootT<=0&&e.frz<=0){
          const dx=p.x-e.x,dy=p.y-e.y,d2=Math.sqrt(dx*dx+dy*dy);
          if(d2>0.001&&d2<500&&enemyShotCount<MAX_ENEMY_PROJECTILES){
            const bspd=bt==="seign"?3.2:2.8;
            g.proj.push({ x:e.x+e.w/2,y:e.y+e.h/2,vx:(dx/d2)*bspd,vy:(dy/d2)*bspd,own:"e",sz:e.tp==="boss"?5:4,tp:"eshot",dmg:dc0.eDmg,life:160 });
            enemyShotCount++;
            if(e.phase>=1){for(let si=-1;si<=1&&enemyShotCount<MAX_ENEMY_PROJECTILES;si+=2){g.proj.push({ x:e.x+e.w/2,y:e.y+e.h/2,vx:(dx/d2)*bspd+si*0.9,vy:(dy/d2)*bspd,own:"e",sz:4,tp:"eshot",dmg:dc0.eDmg,life:130 });enemyShotCount++;}}
            if(e.phase>=2&&bt==="seign"){for(let si=-2;si<=2&&enemyShotCount<MAX_ENEMY_PROJECTILES;si+=4){g.proj.push({ x:e.x+e.w/2,y:e.y+e.h/2,vx:(dx/d2)*bspd+si*0.7,vy:(dy/d2)*bspd,own:"e",sz:4,tp:"eshot",dmg:dc0.eDmg,life:130 });enemyShotCount++;}}
          }
          e.shootT=e.tp==="boss"?rng(38,70):rng(180,320);
        }
      }

      // Non-boss enemies shoot
      if(e.tp!=="boss"){
        e.shootT--;
        if(e.shootT<=0&&e.frz<=0){
          const dx=p.x-e.x,dy=p.y-e.y,d2=Math.sqrt(dx*dx+dy*dy);
          if(d2>0.001&&d2<400&&enemyShotCount<MAX_ENEMY_PROJECTILES){
            const bspd=2.5; const eDmg=dc0.eDmg;
            g.proj.push({ x:e.x+e.w/2,y:e.y+e.h/2,vx:(dx/d2)*bspd,vy:(dy/d2)*bspd,own:"e",sz:4,tp:"eshot",dmg:eDmg,life:160 });
            enemyShotCount++;
          }
          e.shootT=e.tp==="h"?rng(120,200):e.tp==="er"?rng(80,160):rng(180,320);
        }
        if(e.tp!=="boss"&&(e.x<camX-300||e.x>camX+viewW+300))e.vx*=-1;
      }
    });

    let bossDefeated=false;
    g.enemies=g.enemies.filter(e=>{
      if(e.hp<=0){killE(e,g);if(e.tp==="boss"){g.boss=null;g.screenFlash=20;bossDefeated=true;}return false;}
      if(e.tp!=="boss"&&Math.abs(e.x-p.x)>viewW*2)return false;
      return true;
    });
    if(bossDefeated){
      sndBossDeath();
      if((g.stage||1)<(g.maxStage||MAX_STAGE)){
        const sfTotal=(g.sfCollected||0);
        advanceStage();
        raf.current=requestAnimationFrame(loop);
        return;
      }
      const finalSf=g.sfCollected||0;
      setStarFrags(prev=>{const nv=prev+finalSf;savePersist({...loadPersist(),starFrags:nv,hiScore:Math.max(loadPersist().hiScore||0,g.score)});return nv;});
      setFScore(g.score);setHiScore(prev=>Math.max(prev,g.score));setScreen("victory");return;
    }

    // Contact damage
    if(p.inv<=0&&!p.tDash){for(const e of g.enemies){if(p.x<e.x+e.w&&p.x+PW>e.x&&p.y<e.y+e.h&&p.y+PH>e.y){hurtPlayer(g,dc0.eDmg);break;}}}

    // Misc updates
    g.parts=g.parts.filter(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.08;pt.life--;return pt.life>0;});
    g.expl=g.expl.filter(ex=>{ex.t++;ex.r=ex.mr*(ex.t/20);ex.a=1-ex.t/20;return ex.t<20;});
    g.stars.forEach(s=>{s.tw+=0.05;});
    if(g.shake>0)g.shake*=0.85;if(g.shake<0.5)g.shake=0;
    if(g.vig>0)g.vig*=0.95;if(g.vig<0.005)g.vig=0;
    if(g.hitFlash>0)g.hitFlash--;if(g.screenFlash>0)g.screenFlash--;
    g.dustP.forEach(dd=>{dd.x-=dd.sp;if(dd.x<-4)dd.x=CW+4;});
    g.ambientP.forEach(ap=>{ap.x+=ap.vx;ap.y+=ap.vy;ap.t+=0.05;ap.life--;if(ap.life<=0){ap.x=rng(0,CW);ap.y=rng(20,CH-40);ap.life=ap.ml;ap.vx=rng(-0.3,0.3);ap.vy=rng(-0.5,0.1);}});
    g.enemies.forEach(e=>{if(e.hitF>0)e.hitF--;});

    if(p.lives<=0){
      const finalSf=g.sfCollected||0;
      setStarFrags(prev=>{const nv=prev+finalSf;savePersist({...loadPersist(),starFrags:nv,hiScore:Math.max(loadPersist().hiScore||0,g.score)});return nv;});
      setFScore(g.score);setHiScore(prev=>Math.max(prev,g.score));setScreen("gameover");return;
    }

    // ══════════════════════════════════════════════════
    //  DRAW
    // ══════════════════════════════════════════════════
    ctx.save();
    if(g.shake>0)ctx.translate(rng(-g.shake,g.shake),rng(-g.shake,g.shake));
    ctx.save();
    ctx.scale(CAMERA_ZOOM_X,1);
    const z=ZONES[zoneIdx];

    // Sky gradient
    const bgG=ctx.createLinearGradient(0,0,0,CH);
    bgG.addColorStop(0,z.bg1);bgG.addColorStop(0.4,z.bg2);bgG.addColorStop(0.8,z.bg3);bgG.addColorStop(1,z.groundC);
    ctx.fillStyle=bgG;ctx.fillRect(0,0,viewW,CH);

    // Nebula
    const nx1=(viewW*0.65+Math.sin(g.time*0.003)*40);
    ctx.fillStyle=z.nebulaC+"0c";ctx.beginPath();ctx.ellipse(nx1,130,250,150,0.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=z.nebulaC+"08";ctx.beginPath();ctx.ellipse(viewW*0.25,200,180,120,-0.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=z.glowC+"06";
    for(let i=0;i<4;i++){const wx=((i*230+80-camX*0.02)%(CW+200));ctx.beginPath();ctx.ellipse(wx,80+i*60,60+i*20,30,i*0.5,0,Math.PI*2);ctx.fill();}

    // Sky bodies
    const pOff=camX*0.01;
    ctx.save();
    g.skyBodies.slice(0,renderStress?3:g.skyBodies.length).forEach((body,bi)=>{
      const bx=body.x-camX*body.layer+(bi%2===0?-pOff:pOff*0.5);
      const by=body.y+Math.sin(g.time*0.002+body.ph)*6;
      const r=body.r;
      const glowG=ctx.createRadialGradient(bx-r*0.25,by-r*0.3,r*0.15,bx,by,r*1.2);
      glowG.addColorStop(0,z.glowC+"55");glowG.addColorStop(0.5,z.nebulaC+"22");glowG.addColorStop(1,"rgba(0,0,0,0)");
      ctx.globalAlpha=0.26;ctx.fillStyle=glowG;ctx.beginPath();ctx.arc(bx,by,r*1.3,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=0.18;ctx.fillStyle=z.nebulaC;ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=0.14;ctx.fillStyle="#ffffff";ctx.beginPath();ctx.arc(bx-r*0.18,by-r*0.22,r*0.72,0,Math.PI*2);ctx.fill();
      if(body.ring){ctx.globalAlpha=0.16;ctx.strokeStyle=z.glowC+"88";ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(bx,by,r*1.45,r*0.42,-0.3,0,Math.PI*2);ctx.stroke();}
    });
    ctx.restore();

    // Stars
    g.stars.forEach(s=>{
      const px=s.layer<0.33?0.04:s.layer<0.66?0.12:0.25;
      let sx=(s.x-camX*px)%viewW;if(sx<0)sx+=viewW;
      const bright=s.layer<0.33?0.25:s.layer<0.66?0.5:0.8;
      ctx.globalAlpha=bright*(0.4+0.6*Math.sin(s.tw));
      ctx.fillStyle=s.c;ctx.beginPath();ctx.arc(sx,s.y,s.sz,0,Math.PI*2);ctx.fill();
      if(s.sz>1.5&&s.layer>0.5){ctx.globalAlpha*=0.3;ctx.fillRect(sx-s.sz*2,s.y-0.5,s.sz*4,1);ctx.fillRect(sx-0.5,s.y-s.sz*2,1,s.sz*4);}
    });
    ctx.globalAlpha=1;

    // Dust motes
    g.dustP.forEach(dd=>{ctx.globalAlpha=dd.a;ctx.fillStyle=z.glowC+"44";const dy=dd.y+Math.sin(g.time*0.015+dd.x*0.1)*8;ctx.beginPath();ctx.arc(dd.x,dy,dd.sz,0,Math.PI*2);ctx.fill();ctx.fillStyle=z.glowC+"11";ctx.beginPath();ctx.arc(dd.x,dy,dd.sz*3,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;

    // Ambient particles
    ctx.save();ctx.globalCompositeOperation="lighter";
    g.ambientP.forEach((ap,idx)=>{
      if(renderStress&&idx%2===1)return;
      const a=Math.min(1,ap.life/ap.ml)*0.3;ctx.globalAlpha=a;
      if(zoneIdx===0){ctx.fillStyle="#4466ff";ctx.fillRect(ap.x,ap.y+Math.sin(ap.t)*3,ap.sz*0.6,ap.sz*2);ctx.fillStyle="#8899ff";ctx.fillRect(ap.x,ap.y+Math.sin(ap.t)*3,ap.sz*0.3,ap.sz);}
      else if(zoneIdx===1){ctx.fillStyle="#ff6622";ctx.beginPath();ctx.arc(ap.x,ap.y-ap.t*2%CH,ap.sz,0,Math.PI*2);ctx.fill();ctx.fillStyle="#ffaa44";ctx.beginPath();ctx.arc(ap.x,ap.y-ap.t*2%CH,ap.sz*0.4,0,Math.PI*2);ctx.fill();}
      else if(zoneIdx===2){const spY=ap.y+Math.sin(ap.t*1.5)*12;ctx.fillStyle="#44ff88";ctx.beginPath();ctx.arc(ap.x+Math.sin(ap.t*0.7)*5,spY,ap.sz,0,Math.PI*2);ctx.fill();}

      else{ctx.fillStyle="#ffaa00";const gy=ap.y+Math.sin(ap.t*1.2)*10;ctx.beginPath();ctx.arc(ap.x,gy,ap.sz,0,Math.PI*2);ctx.fill();ctx.fillStyle="#fff8";ctx.beginPath();ctx.arc(ap.x+1,gy-1,ap.sz*0.35,0,Math.PI*2);ctx.fill();}
    });
    ctx.globalAlpha=1;ctx.globalCompositeOperation="source-over";ctx.restore();

    // Fog
    ctx.globalAlpha=0.04;
    for(let fi=0;fi<3;fi++){const fx=((fi*320+50-camX*(0.08+fi*0.04))%(viewW+300))-100;const fy=GROUND_Y-80+fi*25;ctx.fillStyle=z.glowC;ctx.beginPath();ctx.ellipse(fx,fy,180+fi*40,25+fi*10,0,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;

    function calc(e) {
      const r = baseRef.current.getBoundingClientRect();

      const cssScale = r.width / SIZE;

  }

  // ── UPGRADES SCREEN — TALENT TREE ────────────────────────────────────────────
  if (screen === "upgrades") {
    const curSf = starFrags;
    function buyUpgrade(id) {
      const def = UPGRADE_DEFS.find(u => u.id === id);
      if (!def) return;
      const lvl = upgrades[id] || 0;
      if (lvl >= def.max) return;
      if (!reqSatisfied(def, upgrades)) return;
      if (curSf < def.cost) return;
      const newSf = curSf - def.cost;
      const newUpg = { ...upgrades, [id]: lvl + 1 };
      const p = loadPersist();
      p.starFrags = newSf;
      p.upgrades = newUpg;
      savePersist(p);
      setStarFrags(newSf);
      setUpgrades(newUpg);
    }
    function resetUpgrades() {
      if (!window.confirm("Réinitialiser tous les talents ? (rembourse 70% des SF investis)")) return;
      let refund = 0;
      UPGRADE_DEFS.forEach(def => {
        const lvl = upgrades[def.id] || 0;
        refund += lvl * def.cost;
      });
      refund = Math.floor(refund * 0.7);
      const newSf = curSf + refund;
      const p = loadPersist();
      p.starFrags = newSf;
      p.upgrades = {};
      savePersist(p);
      setStarFrags(newSf);
      setUpgrades({});
    }

    const treeKeys = Object.keys(TREES);
    const COL_W = 168, COL_GAP = 6;
    const totalW = treeKeys.length * COL_W + (treeKeys.length - 1) * COL_GAP;

    return (
      <div style={{...screenStyle, width:CW, height:CH, justifyContent:"flex-start", paddingTop:8}}>
        <StarBg/>
        <div style={{fontSize:18,fontWeight:800,color:"#ffcc44",letterSpacing:2}}>✦ ARBRE DE TALENTS</div>
        <div style={{
          fontSize:13, fontWeight:700, color:"#ffcc44", marginTop:3, marginBottom:8,
          padding:"3px 14px", borderRadius:12, background:"rgba(255,200,60,0.1)",
          border:"1px solid #ffcc4433"
        }}>✦ {curSf} Star Fragments</div>

        <div style={{display:"flex", gap:COL_GAP, width:totalW}}>
          {treeKeys.map(treeKey => {
            const tree = TREES[treeKey];
            const items = UPGRADE_DEFS.filter(u => u.tree === treeKey).sort((a,b) => b.tier - a.tier);
            return (
              <div key={treeKey} style={{
                width:COL_W, display:"flex", flexDirection:"column", gap:4,
                padding:"6px 5px", borderRadius:8,
                border:`1px solid ${tree.color}44`,
                background:`linear-gradient(180deg, ${tree.color}10 0%, rgba(5,8,20,0.8) 100%)`,
              }}>
                <div style={{
                  textAlign:"center", fontSize:13, fontWeight:800, color:tree.color,
                  letterSpacing:2, padding:"3px 0 4px 0",
                  borderBottom:`1px solid ${tree.color}33`
                }}>{tree.icon} {tree.name}</div>
                {items.map(def => {
                  const lvl = upgrades[def.id] || 0;
                  const maxed = lvl >= def.max;
                  const reqMet = reqSatisfied(def, upgrades);
                  const canBuy = !maxed && reqMet && curSf >= def.cost;
                  const locked = !reqMet && lvl === 0;
                  return (
                    <div key={def.id} style={{
                      padding:"5px 6px", borderRadius:6,
                      border:`1.5px solid ${maxed?tree.color:locked?"#222":canBuy?tree.color+"aa":"#334"}`,
                      background: locked ? "rgba(5,8,15,0.75)" : "rgba(12,16,30,0.88)",
                      opacity: locked ? 0.5 : 1,
                      transition:"all 0.2s"
                    }}>
                      <div style={{display:"flex", alignItems:"center", gap:6}}>
                        <div style={{fontSize:16, color: maxed?tree.color:canBuy?tree.color:locked?"#556":"#889"}}>{locked?"🔒":def.icon}</div>
                        <div style={{flex:1, lineHeight:1.15}}>
                          <div style={{fontSize:9, fontWeight:700, color:"#ddd"}}>{def.name}</div>
                          <div style={{fontSize:8, color:"#889"}}>{def.desc}</div>
                        </div>
                      </div>
                      <div style={{display:"flex", justifyContent:"center", gap:2, marginTop:3}}>
                        {Array.from({length:def.max},(_,i)=>(
                          <span key={i} style={{
                            width:7, height:7, borderRadius:1, display:"inline-block",
                            background: i<lvl ? tree.color : "#223",
                            border: `1px solid ${i<lvl ? tree.color : "#334"}`
                          }}/>
                        ))}
                      </div>
                      {maxed ? (
                        <div style={{fontSize:8, color:tree.color, fontWeight:700, textAlign:"center", marginTop:2}}>✓ MAX</div>
                      ) : locked ? (
                        <div style={{fontSize:7, color:"#667", textAlign:"center", marginTop:2, lineHeight:1.2}}>Requiert:<br/>{reqLabel(def)}</div>
                      ) : (
                        <button
                          onClick={() => buyUpgrade(def.id)}
                          disabled={!canBuy}
                          style={{
                            display:"block", width:"100%", marginTop:3,
                            padding:"3px 0", borderRadius:4,
                            border:`1px solid ${canBuy?tree.color:"#334"}`,
                            background: canBuy ? tree.color+"22" : "rgba(20,25,40,0.5)",
                            color: canBuy ? tree.color : "#556",
                            cursor: canBuy ? "pointer" : "not-allowed",
                            fontSize:9, fontWeight:700, fontFamily:"'Courier New',monospace"
                          }}>
                          ✦ {def.cost} SF {lvl>0?`(${lvl}/${def.max})`:""}
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>

        <div style={{display:"flex", gap:10, marginTop:10}}>
          <button className="menu-btn"
            onClick={() => setScreen("title")}
            style={{padding:"6px 18px",borderRadius:6,border:"1px solid #334",background:"rgba(255,255,255,0.04)",
              color:"#99aacc",cursor:"pointer",fontSize:11,fontFamily:"'Courier New',monospace",transition:"all 0.2s"}}>
            ← Retour
          </button>
          <button className="menu-btn"
            onClick={resetUpgrades}
            style={{padding:"6px 18px",borderRadius:6,border:"1px solid #663333",background:"rgba(150,50,50,0.12)",
              color:"#cc8888",cursor:"pointer",fontSize:11,fontFamily:"'Courier New',monospace",transition:"all 0.2s"}}>
            ↺ Respec (70%)
          </button>
        </div>
      </div>
    );
  }

  // ── GAME OVER SCREEN ─────────────────────────────────────────────────────────
  if (screen === "gameover") {
    const g = gs.current;
    const sc = (g && g.score) || fScore || 0;
    const sfE = (g && g.sfCollected) || 0;
    const stg = (g && g.stage) || 1;
    const rank = sc >= 50000 ? "S" : sc >= 30000 ? "A" : sc >= 15000 ? "B" : sc >= 5000 ? "C" : "D";
    const rCol = {S:"#ffcc44",A:"#88ff88",B:"#88aaff",C:"#ffaa44",D:"#ff6666"}[rank];
    return (
      <div style={{...screenStyle, width:CW, height:CH}}>
        <StarBg/>
        <div style={{fontSize:38,fontWeight:900,color:"#ff4444",marginBottom:4,letterSpacing:3}}>GAME OVER</div>
        <div style={{fontSize:10,color:"#664",letterSpacing:5,marginBottom:20}}>LA GALAXIE A ÉTÉ PERDUE</div>
        <div style={{fontSize:64,fontWeight:900,color:rCol,marginBottom:12,textShadow:`0 0 24px ${rCol}`}}>
          {rank}
        </div>
        <div style={{display:"flex",gap:24,marginBottom:24}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:700,color:"#88aaff"}}>{sc.toLocaleString()}</div>
            <div style={{fontSize:9,color:"#556",letterSpacing:2}}>SCORE</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:700,color:"#88aaff"}}>{hiScore.toLocaleString()}</div>
            <div style={{fontSize:9,color:"#556",letterSpacing:2}}>RECORD</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:700,color:"#ffcc44"}}>{sfE}</div>
            <div style={{fontSize:9,color:"#556",letterSpacing:2}}>STAR FRAGS</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:700,color:"#cc88ff"}}>Stage {stg}</div>
            <div style={{fontSize:9,color:"#556",letterSpacing:2}}>ATTEINT</div>
          </div>
        </div>
        {sc > 0 && sc >= hiScore && (
          <div style={{marginBottom:12,color:"#ffcc44",fontWeight:700,fontSize:13}}>
            🏆 NOUVEAU RECORD !
          </div>
        )}
        <div style={{display:"flex",gap:10}}>
          <button className="menu-btn"
            onClick={() => setScreen("title")}
            style={{padding:"10px 24px",borderRadius:7,border:"2px solid #4488ff66",background:"rgba(20,50,180,0.15)",
              color:"#88aaff",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'Courier New',monospace",transition:"all 0.2s"}}>
            ↩ MENU
          </button>
          <button className="menu-btn"
            onClick={() => {
              const anoms = pickAnomalies();
              setPendingAnomalies(anoms);
              setActiveAnomalies(anoms);
              setScreen("anomaly");
            }}
            style={{padding:"10px 24px",borderRadius:7,border:"2px solid #ff444466",background:"rgba(180,20,20,0.15)",
              color:"#ff8888",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'Courier New',monospace",transition:"all 0.2s"}}>
            ↻ REJOUER
          </button>
        </div>
      </div>
    );
  }

  // ── VICTORY SCREEN ───────────────────────────────────────────────────────────
  if (screen === "victory") {
    const g = gs.current;
    const sc = (g && g.score) || fScore || 0;
    const sfE = (g && g.sfCollected) || 0;
    const rank = sc >= 80000 ? "S+" : sc >= 60000 ? "S" : sc >= 40000 ? "A" : sc >= 20000 ? "B" : "C";
    const rCol = {"S+":"#ffffff","S":"#ffcc44","A":"#88ff88","B":"#88aaff","C":"#ffaa44"}[rank];
    return (
      <div style={{...screenStyle, width:CW, height:CH}}>
        <StarBg/>
        <div style={{fontSize:38,fontWeight:900,color:"#ffcc44",marginBottom:4,letterSpacing:3,
          textShadow:"0 0 20px #ffcc44,0 0 40px #ff8800"}}>VICTOIRE !</div>
        <div style={{fontSize:10,color:"#8899cc",letterSpacing:5,marginBottom:20}}>LA GALAXIE EST SAUVÉE</div>
        <div style={{fontSize:64,fontWeight:900,color:rCol,marginBottom:12,textShadow:`0 0 30px ${rCol}`}}>
          {rank}
        </div>
        <div style={{fontSize:11,color:"#cc88ff",marginBottom:20,textAlign:"center",lineHeight:1.8}}>
          4 zones traversées · Boss Final vaincu<br/>L'univers est sauvé.
        </div>
        <div style={{display:"flex",gap:24,marginBottom:28}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:24,fontWeight:700,color:"#88aaff"}}>{sc.toLocaleString()}</div>
            <div style={{fontSize:9,color:"#556",letterSpacing:2}}>SCORE FINAL</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:24,fontWeight:700,color:"#ffcc44"}}>{sfE}</div>
            <div style={{fontSize:9,color:"#556",letterSpacing:2}}>STAR FRAGS</div>
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="menu-btn"
            onClick={() => setScreen("title")}
            style={{padding:"10px 24px",borderRadius:7,border:"2px solid #ffcc4466",background:"rgba(180,130,0,0.15)",
              color:"#ffcc44",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'Courier New',monospace",transition:"all 0.2s"}}>
            ↩ MENU
          </button>
          <button className="menu-btn"
            onClick={() => setScreen("upgrades")}
            style={{padding:"10px 24px",borderRadius:7,border:"2px solid #44ff8866",background:"rgba(0,130,50,0.15)",
              color:"#88ff88",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'Courier New',monospace",transition:"all 0.2s"}}>
            ✦ AMÉLIORATIONS
          </button>
        </div>
      </div>
    );
  }

  // ── PLAYING SCREEN ───────────────────────────────────────────────────────────
  return (
    <div style={{position:"relative",width:CW,height:CH,overflow:"hidden",background:"#000"}}>
      <canvas ref={canvasRef} width={CW} height={CH}
        style={{display:"block",imageRendering:"pixelated",width:CW,height:CH}} />

      {/* Touch overlay */}
      <div style={{position:"absolute",inset:0,pointerEvents:"none"}}>

        {/* ── Virtual joystick (left thumb) ────────────────────────── */}
        <VirtualJoystick />

        {/* ── Action buttons — diamond layout (ABXY-style), right thumb ── */}
        {/* SHOOT (B) — rightmost, primary attack — biggest */}
        <TBtn id="shoot" label="⚡" keyHint="E" style={{
          bottom:92, right:14, width:54, height:54,
          borderRadius:"50%",
          background:"rgba(60,230,120,0.18)",
          border:"2px solid rgba(60,230,120,0.45)",
          fontSize:18,
          pointerEvents:"auto"
        }} />
        {/* JUMP (A) — bottom, primary move */}
        <TBtn id="jump" label="↑" keyHint="SPACE" style={{
          bottom:38, right:70, width:52, height:52,
          borderRadius:"50%",
          background:"rgba(80,180,255,0.18)",
          border:"2px solid rgba(80,180,255,0.45)",
          fontSize:20, fontWeight:900,
          pointerEvents:"auto"
        }} />
        {/* BOMB (X) — left of cluster */}
        <TBtn id="bomb"  label="💣" keyHint="A" style={{
          bottom:92, right:126, width:46, height:46,
          borderRadius:"50%",
          background:"rgba(255,90,90,0.16)",
          border:"2px solid rgba(255,90,90,0.38)",
          pointerEvents:"auto"
        }} />
        {/* ULT (Y) — top, special */}
        <TBtn id="ult"   label="★" keyHint="F" style={{
          bottom:146, right:70, width:46, height:46,
          borderRadius:"50%",
          background:"rgba(180,80,255,0.16)",
          border:"2px solid rgba(180,80,255,0.4)",
          fontSize:18,
          pointerEvents:"auto"
        }} />
        {/* TP — only for void class, below joystick on left */}
        {selCls === "void_c" && <TBtn id="tp" label="⟐" keyHint="L" style={{
          bottom:46, left:126, width:42, height:42,
          borderRadius:"50%",
          background:"rgba(200,110,255,0.16)",
          border:"2px solid rgba(200,110,255,0.4)",
          fontSize:16,
          pointerEvents:"auto"
        }} />}

        {/* ── Version indicator ───────────────────────────────────── */}
        <div style={{position:"absolute",bottom:4,left:"50%",transform:"translateX(-50%)",
          fontSize:9,color:"rgba(255,255,255,0.22)",fontFamily:"'Courier New',monospace",
          pointerEvents:"none",letterSpacing:1}}>v14</div>

        {/* ── Pause ────────────────────────────────────────────────── */}
        <button
          onPointerDown={e => { e.preventDefault(); const next=!pausedRef.current; pausedRef.current=next; setPaused(pv=>!pv); if(next)pauseBGMusic();else resumeBGMusic(); }}
          style={{
            position:"absolute", top:6, right:6, width:32, height:32, borderRadius:6,
            border:"1px solid rgba(255,255,255,0.25)", background:"rgba(0,0,0,0.45)",
            color:"#fff", fontSize:13, cursor:"pointer",
            display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
            gap:1, pointerEvents:"auto"
          }}>
          <span style={{lineHeight:1}}>II</span>
          <span style={{fontSize:7,opacity:0.6,color:"#aabbff",fontFamily:"'Courier New',monospace",lineHeight:1}}>P</span>
        </button>
      </div>
    </div>
  );
}

// ── mount ────────────────────────────────────────────────────────────────────
const _csRoot = ReactDOM.createRoot(document.getElementById("root"));
_csRoot.render(React.createElement(CosmicSlug));
  </script>
  <script>
    var APP_VERSION = 'v14';
    if ('serviceWorker' in navigator) {
      var _swRefreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (!_swRefreshing) { _swRefreshing = true; window.location.reload(); }
      });
      window.addEventListener('load', function() {
        // Unregister ALL old service workers, then re-register with version param
        // This breaks stale caches that prevent updates from being detected
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          var unregPromises = regs.map(function(r) { return r.unregister(); });
          return Promise.all(unregPromises);
        }).then(function() {
          return navigator.serviceWorker.register('./sw.js?v=14');
        }).then(function(reg) {
          reg.update();
          // If a waiting SW exists, tell it to take over immediately
          if (reg.waiting) { reg.waiting.postMessage({type:'SKIP_WAITING'}); }
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                newWorker.postMessage({type:'SKIP_WAITING'});
              }
            });
          });
        }).catch(function() {});
      });
    }
    // Rotate overlay for portrait mode on mobile
    var _rotOverlay = document.createElement('div');
    _rotOverlay.id = '_rot';
    _rotOverlay.innerHTML = '<div style="font-size:48px">📱➡️</div><div style="font-size:18px;margin-top:12px;letter-spacing:2px">TOURNE TON TÉLÉPHONE</div>';
    _rotOverlay.style.cssText = 'display:none;position:fixed;inset:0;z-index:9999;background:#000;color:#4af;font-family:monospace;align-items:center;justify-content:center;flex-direction:column;text-align:center;';
    document.body.appendChild(_rotOverlay);

    // Scale the game to fill the screen
    function _scaleGame() {
      const root = document.getElementById('root');
      const ov = document.getElementById('_rot');
      if (!root) return;
      const sw = window.innerWidth;
      const sh = window.innerHeight;
      const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || sw < 900;
      const isPortrait = sh > sw;
      if (ov) ov.style.display = (isMobile && isPortrait) ? 'flex' : 'none';
      var scale, marginLeft, marginTop;
      if (isMobile && !isPortrait) {
        // Fit: scale so the full 800x520 stays on screen — HUD must not be cropped.
        // Small 3% padding from edges for notch / home indicator safety.
        scale = Math.min(sw / 800, sh / 520) * 0.97;
        marginLeft = (sw - 800 * scale) / 2;
        marginTop  = (sh - 520 * scale) / 2;
      } else {
        // Desktop / portrait: uniform fit — no cropping.
        scale = Math.min(sw / 800, sh / 520);
        marginLeft = (sw - 800 * scale) / 2;
        marginTop  = (sh - 520 * scale) / 2;
      }
      root.style.transform = 'scale(' + scale + ')';
      root.style.marginLeft = marginLeft + 'px';
      root.style.marginTop  = marginTop  + 'px';
    }
    window.addEventListener('resize', _scaleGame);
    window.addEventListener('orientationchange', function(){ setTimeout(_scaleGame, 300); });
    document.addEventListener('fullscreenchange', _scaleGame);
    // In browser mode, auto-request fullscreen on first tap to remove chrome
    (function() {
      var isPWA = window.matchMedia('(display-mode: standalone)').matches || !!window.navigator.standalone;
      if (!isPWA && document.documentElement.requestFullscreen) {
        document.addEventListener('pointerdown', function _reqFs() {
          document.documentElement.requestFullscreen({ navigationUI: 'hide' })
            .then(_scaleGame).catch(function(){});
          document.removeEventListener('pointerdown', _reqFs);
        }, { once: true });
      }
    })();
    setTimeout(_scaleGame, 100);
  </script>
</body>
